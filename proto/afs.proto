syntax = "proto3";

package afs;

option go_package = "primality_afs/pb";

service AFS {
    rpc TestAuth  (TestAuthRequest)   returns (TestAuthResponse);
    rpc FetchFile (FileRequest)       returns (stream FileChunk);
    rpc StoreFile (stream StoreChunk) returns (StoreResponse);
    rpc GetPrimary (Empty)            returns (PrimaryInfo);
}

service Raft {
    // Leader → Followers: replicate log entries + heartbeat (empty entries)
    rpc AppendEntries (AppendEntriesRequest)  returns (AppendEntriesResponse);
    // Candidate → Peers: request a vote
    rpc RequestVote   (RequestVoteRequest)    returns (RequestVoteResponse);
}

service Replica {
    rpc ReplicateFile (stream ReplicateChunk) returns (ReplicateResponse);
    rpc Heartbeat     (HeartbeatRequest)      returns (HeartbeatResponse);
}

message TestAuthRequest {
    string filename = 1;
    int32  version  = 2;
}

message TestAuthResponse {
    bool  is_valid       = 1;
    int32 server_version = 2;
}

message FileRequest {
    string filename = 1;
}

message FileChunk {
    bytes content = 1;
    int32 version = 2;
}

message StoreChunk {
    string filename = 1;
    bytes  content  = 2;
}

message StoreResponse {
    bool  success     = 1;
    int32 new_version = 2;
}

message Empty {}

message PrimaryInfo {
    string address    = 1;
    bool   is_primary = 2;
}

message ReplicateChunk {
    string filename = 1;
    bytes  content  = 2;
    int32  version  = 3;
}

message ReplicateResponse {
    bool  success = 1;
    int32 version = 2;
}

message HeartbeatRequest {
    string primary_addr = 1;
    int32  term         = 2;
}

message HeartbeatResponse {
    bool ok = 1;
}


message LogEntry {
    int64  term     = 1;   // term when entry was received by leader
    int64  index    = 2;   // 1-based position in the log
    string filename = 3;   // file being written
    bytes  data     = 4;   // full file contents
    int32  version  = 5;   // file version assigned by leader
}

message AppendEntriesRequest {
    int64  term           = 1;   // leader's current term
    string leader_id      = 2;   // leader's address (so followers can redirect clients)
    int64  prev_log_index = 3;   // index of log entry immediately before new ones
    int64  prev_log_term  = 4;   // term of prev_log_index entry
    repeated LogEntry entries = 5; // empty for heartbeat
    int64  leader_commit  = 6;   // leader's commitIndex
}

message AppendEntriesResponse {
    int64 term    = 1;   // currentTerm, for leader to update itself
    bool  success = 2;
    // Optimised back-tracking: follower hints the correct nextIndex
    int64 conflict_index = 3;  // first index of conflicting term (0 if none)
    int64 conflict_term  = 4;  // term of conflicting entry (0 if none)
}

message RequestVoteRequest {
    int64  term           = 1;   // candidate's term
    string candidate_id   = 2;   // candidate's address
    int64  last_log_index = 3;   // index of candidate's last log entry
    int64  last_log_term  = 4;   // term  of candidate's last log entry
}

message RequestVoteResponse {
    int64 term         = 1;   // currentTerm, for candidate to update itself
    bool  vote_granted = 2;
}