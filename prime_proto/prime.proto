syntax = "proto3";

package primepb;

option go_package = "primality_afs/prime_proto;primepb";

message WorkChunk {
    int32 id = 1;
    repeated uint64 values = 2;
    int32 start_offset = 3;  
}

message PrimeResult {
    int32 chunk_id = 1;
    repeated uint64 primes = 2;
}

message SnapshotRequest {
    string marker = 1;
}

message SnapshotResponse {
    int32 current_chunk_id = 1;
    int32 offset = 2;
}

service PrimeWorker {
    rpc ProcessChunk (WorkChunk) returns (PrimeResult);
    rpc CaptureState (SnapshotRequest) returns (SnapshotResponse);
}